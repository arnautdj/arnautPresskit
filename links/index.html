<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARNAUT | Enlaces</title>
    <link rel="icon" type="image/png" href="../images/ico.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-2: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --border-strong: rgba(255, 255, 255, 0.18);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.58);
            --shadow: 0 18px 55px rgba(0, 0, 0, 0.55);
            --radius: 18px;
            --radius-sm: 14px;
            --maxw: 520px;
        }

        body {
            background: radial-gradient(900px 500px at 20% -10%, rgba(255, 255, 255, 0.10), transparent 60%),
                        radial-gradient(700px 420px at 85% 0%, rgba(255, 255, 255, 0.08), transparent 55%),
                        radial-gradient(700px 500px at 70% 105%, rgba(255, 255, 255, 0.06), transparent 60%),
                        linear-gradient(180deg, #000000 0%, var(--bg) 65%, #000000 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: 44px 20px;
            margin: 0;
        }

        .wrap {
            width: 100%;
            max-width: var(--maxw);
            position: relative;
        }

        .bg-text {
            position: absolute;
            inset: -10px -10px auto -10px;
            top: -14px;
            text-align: center;
            pointer-events: none;
            user-select: none;
            font-weight: 800;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-size: clamp(56px, 12vw, 92px);
            color: rgba(255, 255, 255, 0.06);
            filter: blur(0.15px);
        }

        .card {
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, var(--surface), var(--surface-2));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(700px 260px at 50% 0%, rgba(255, 255, 255, 0.12), transparent 55%);
            opacity: 0.75;
            pointer-events: none;
        }

        .header {
            position: relative;
            padding: 26px 22px 16px;
            display: grid;
            justify-items: center;
            text-align: center;
            gap: 10px;
        }

        .profile-img {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 35%;
            border: 1px solid var(--border-strong);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
        }

        .handle {
            font-size: 0.92rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 2.6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.86);
        }

        .sub {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .links-container {
            position: relative;
            padding: 14px 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;

            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            text-decoration: none;
            padding: 16px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            border: 1px solid var(--border);
            transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            flex: 0 0 auto;
        }

        .label {
            display: grid;
            gap: 2px;
            min-width: 0;
        }

        .label strong {
            font-weight: 700;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .label span {
            color: var(--muted);
            font-size: 0.86rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chev {
            color: rgba(255, 255, 255, 0.55);
            transition: transform 180ms ease, color 180ms ease;
            flex: 0 0 auto;
        }

        .link-card:hover,
        .link-card:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            border-color: var(--border-strong);
            background: rgba(255, 255, 255, 0.08);
        }

        .link-card:hover .chev,
        .link-card:focus-visible .chev {
            transform: translateX(2px);
            color: rgba(255, 255, 255, 0.8);
        }

        .link-card:active {
            transform: translateY(0px) scale(0.99);
            background: rgba(255, 255, 255, 0.07);
        }

        .primary {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .primary .icon {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.10);
            margin: 2px 16px 0;
        }

        .footer {
            position: relative;
            padding: 16px 16px 18px;
            display: grid;
            justify-items: center;
            gap: 10px;
        }

        .footer-logo {
            opacity: 0.55;
            height: 24px;
        }

        .mini {
            margin: 0;
            font-size: 0.78rem;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
        }

        @media (prefers-reduced-motion: reduce) {
            .link-card,
            .chev {
                transition: none;
            }
        }
    </style>
</head>
